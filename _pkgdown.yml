url: https://ehrlinger.github.io/hvtiPlotR/
template:
  bootstrap: 5
  bslib:
    bootswatch: zephyr
    base_font: {google: "Outfit"}
    code_font: {google: "Fira Code"}
  light-switch: true
  theme: atom-one-light
  theme-dark: atom-one-dark

home:
  sidebar:
    structure: [badges, links, authors]
    components:
      badges:
        title: Package badges
        text: |
          ![](https://img.shields.io/github/r-package/v/ehrlinger/hvtiplotr)<br>
          ![](https://img.shields.io/github/actions/workflow/status/ehrlinger/hvtiplotr/pkgdown.yaml)<br>

navbar:
  structure:
    right: [search, github, my_linkedin, lightswitch]
  components:
    my_linkedin:
      icon: fa-linkedin
      href: https://www.linkedin.com/in/ehrlinger/
      aria-label: LinkedIn

reference:
- title: "Package Overview"
  desc: >
    Package-level documentation and the base S3 class shared by all
    hvtiPlotR data objects.
  contents:
  - hvtiPlotR-package
  - is_hvti_data

- title: "Themes"
  desc: >
    Apply publication-quality themes to any ggplot2 object. Use
    `hvti_theme()` as the single entry point; the lower-level
    `hvti_theme_*()` functions are also exported for direct use.
  contents:
  - hvti_theme
  - hvti_theme_manuscript
  - hvti_theme_dark_ppt
  - hvti_theme_light_ppt
  - hvti_theme_poster
  - hvti_theme_ppt
  - theme_manuscript
  - theme_man
  - theme_dark_ppt
  - theme_light_ppt
  - theme_poster
  - theme_ppt

- title: "Survival & Hazard"
  desc: >
    Kaplan-Meier survival curves, parametric hazard plots, survival
    differences, and number-needed-to-treat. Use `hvti_survival()` for
    non-parametric KM estimates; `hvti_hazard()`, `hvti_survival_difference()`,
    and `hvti_nnt()` for pre-fitted parametric model output.
  contents:
  - hvti_survival
  - plot.hvti_survival
  - print.hvti_survival
  - hvti_hazard
  - plot.hvti_hazard
  - print.hvti_hazard
  - hvti_survival_difference
  - plot.hvti_survival_difference
  - print.hvti_survival_difference
  - hvti_nnt
  - plot.hvti_nnt
  - print.hvti_nnt
  - sample_survival_data
  - sample_hazard_data
  - sample_hazard_empirical
  - sample_life_table
  - sample_survival_difference_data
  - sample_nnt_data
  - nonparametric
  - parametric

- title: "Nonparametric Temporal Curves"
  desc: >
    Average temporal curves and ordinal outcome trajectories from
    decomposition models (`tp.np.*` template family).
  contents:
  - hvti_nonparametric
  - plot.hvti_nonparametric
  - print.hvti_nonparametric
  - hvti_ordinal
  - plot.hvti_ordinal
  - print.hvti_ordinal
  - sample_nonparametric_curve_data
  - sample_nonparametric_curve_points
  - sample_nonparametric_ordinal_data
  - sample_nonparametric_ordinal_points

- title: "Propensity Score & Matching"
  desc: >
    Visualise propensity score distributions and covariate balance
    before and after propensity matching or IPTW weighting.
  contents:
  - hvti_mirror
  - plot.hvti_mirror
  - print.hvti_mirror
  - hvti_balance
  - plot.hvti_balance
  - print.hvti_balance
  - sample_mirror_histogram_data
  - sample_covariate_balance_data

- title: "Temporal Trends & Longitudinal"
  desc: >
    Annual trend lines, individual patient trajectories, and longitudinal
    count summaries. Ports `tp.lp.trends.*`, `tp.rp.trends.*`,
    `tp.dp.trends.R`, and `tp.dp.spaghetti.echo.R`.
  contents:
  - hvti_trends
  - plot.hvti_trends
  - print.hvti_trends
  - hvti_spaghetti
  - plot.hvti_spaghetti
  - print.hvti_spaghetti
  - hvti_longitudinal
  - plot.hvti_longitudinal
  - print.hvti_longitudinal
  - sample_trends_data
  - sample_spaghetti_data
  - sample_longitudinal_counts_data

- title: "Study Design & Goodness of Follow-Up"
  desc: >
    Visualise follow-up completeness. Ports `tp.dp.gfup.R`.
  contents:
  - hvti_followup
  - plot.hvti_followup
  - print.hvti_followup
  - sample_goodness_followup_data

- title: "Stacked Histogram"
  desc: >
    Stacked or filled histogram of a numeric variable by group.
  contents:
  - hvti_stacked
  - plot.hvti_stacked
  - print.hvti_stacked
  - sample_stacked_histogram_data

- title: "Flow Diagrams"
  desc: >
    Alluvial (Sankey) plots showing patient flow between states or
    cluster assignments across K values.
  contents:
  - hvti_alluvial
  - plot.hvti_alluvial
  - print.hvti_alluvial
  - hvti_sankey
  - plot.hvti_sankey
  - print.hvti_sankey
  - sample_alluvial_data
  - sample_cluster_sankey_data

- title: "Exploratory Data Analysis"
  desc: >
    Rapid bar charts and scatter plots for variable screening, univariate
    summaries, and set-membership visualisation.
  contents:
  - hvti_eda
  - plot.hvti_eda
  - print.hvti_eda
  - hvti_upset
  - plot.hvti_upset
  - print.hvti_upset
  - eda_classify_var
  - eda_select_vars
  - sample_eda_data
  - sample_upset_data

- title: "Saving & Utilities"
  desc: >
    Save figures to PowerPoint or PDF. Add draft footnotes during analysis;
    omit them for publication-ready output.
  contents:
  - save_ppt
  - make_footnote
  - makeFootnote

articles:
- title: "Getting Started"
  contents:
  - hvtiPlotR
  - sas-migration-guide

- title: "Plot Functions"
  contents:
  - plot-functions
  - plot-decorators

- title: "Contributing"
  contents:
  - contributing

footer:
  structure:
    left: developed_by
    right: built_with_pkgdown
  components:
    developed_by: "John Ehrlinger"
    built_with_pkgdown: "This site was built using [pkgdown](https://pkgdown.r-lib.org/)!&nbsp;&nbsp;<img src='https://pkgdown.r-lib.org/logo.png' alt='pkgdown logo' width='25'>"
