# One-shot workflow to validate ggalluvial patch 7c2507f against R-devel.
# Once confirmed working this file can be deleted.
#
# Trigger: manual (workflow_dispatch) or any push to the test branch.
#
# WHY THE ORDER MATTERS:
# lazyeval 0.2.2 uses the C symbol PREXPR which was deliberately removed from
# R-devel's public API. It cannot be compiled on R-devel at all. As long as
# ggalluvial's DESCRIPTION still lists lazyeval as a dependency, pak will try
# to build it from source and abort before our patch step runs.
#
# Solution: install the patched ggalluvial FIRST (bypassing the lockfile),
# then install remaining dependencies via pak. pak will see ggalluvial is
# already present and skip it — and if the patch correctly removes lazyeval
# from DESCRIPTION, pak will no longer attempt to install lazyeval either.

on:
  workflow_dispatch:
  push:
    branches: [test-ggalluvial-patch]

name: test-ggalluvial-patch

permissions: read-all

jobs:
  test-patch:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'devel'
          http-user-agent: 'release'
          use-public-rspm: true
          rtools-version: '44'

      # Bootstrap remotes before anything else so we can fetch the patch.
      - name: Bootstrap remotes
        run: install.packages("remotes")
        shell: Rscript {0}

      # Install the patched ggalluvial BEFORE pak resolves the lockfile.
      # If the patch removes lazyeval from DESCRIPTION, pak will not attempt
      # to build lazyeval when it installs remaining dependencies below.
      - name: Install ggalluvial patch (7c2507f)
        run: |
          remotes::install_github(
            "corybrunson/ggalluvial",
            ref = "7c2507f992e54649900b47c6e9980232d5d60b4c",
            upgrade = "never"
          )
        shell: Rscript {0}

      # Now install remaining dependencies. pak sees ggalluvial is already
      # installed and skips it (along with its old lazyeval dep).
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: Install package for vignette rendering
        run: Rscript -e "install.packages('.', repos = NULL, type = 'source')"

      # Full check — no continue-on-error, warnings are errors.
      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
          error_on: 'warning'
